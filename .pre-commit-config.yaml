fail_fast: true
default_stages: [pre-commit]   # existing hooks run per-commit; tests run pre-push (below)

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
      - id: no-commit-to-branch
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        pass_filenames: false
        types: [ts, tsx]
      - id: typecheck
        name: typecheck
        entry: npm run typecheck
        language: system
        pass_filenames: false
        types: [ts, tsx]
      # Tests run at PRE-PUSH (not per-commit) and only for what changed
      # (vitest `related` runs the tests that import the changed files).
      # CI runs the full suite.
      - id: vitest-changed
        name: vitest (changed only, pre-push)
        entry: npx vitest related --run
        language: system
        stages: [pre-push]
        types_or: [ts, tsx]
