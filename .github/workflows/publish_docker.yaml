name: Publish Docker image

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  push_to_registry:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Log in to the Container registry
        uses: docker/login-action@03c851098f316948386b8ff87f424ddf8c01536e
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@703896b4f30f62d53f5530a80bcdc589a3f702bc
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            latest
            prod
            ${{ github.event.release.tag_name }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* values bake into the client bundle at build time
          # (see Dockerfile), so this GHCR image — the one QA on Proxmox pulls
          # — must carry the NON-prod OAuth client and APP_ENV=qa. Without
          # these, QA sign-in silently breaks (no client id in the bundle).
          # Prod is unaffected: prod runs the Artifact Registry image built by
          # deploy_cloud_run.yaml with the prod client. Set the repo variable
          # GOOGLE_CLIENT_ID_NONPROD to the non-prod client id.
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID_NONPROD }}
            NEXT_PUBLIC_APP_ENV=qa
          # No artifact-attestation step: actions/attest-build-provenance
          # requires a public repo or GitHub Enterprise (fails with "Feature
          # not available for user-owned private repositories" otherwise) —
          # this repo is private.
