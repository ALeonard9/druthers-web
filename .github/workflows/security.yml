name: security
on:
  pull_request: { branches: [main] }
  push:         { branches: [main] }
  schedule:     [{ cron: "0 6 * * 1" }]
jobs:
  scan:
    uses: ALeonard9/.github/.github/workflows/security-reusable.yml@main
    with:
      stack: node
      builds_image: true
      block: true
      severity: "CRITICAL,HIGH"
    secrets: inherit
    permissions:
      contents: read
      security-events: write
      issues: write
      actions: read
