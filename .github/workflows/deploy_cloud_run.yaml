name: Deploy to Cloud Run

# Prod deploys are release-driven (see druthers-infra/docs/PROMOTION.md):
# publishing a vX.Y.Z release builds the image (with NEXT_PUBLIC_* baked in)
# into Artifact Registry and rolls the druthers-web service.
# No-ops until the GCP_* repo variables exist (set by the launch runbook).

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.GCP_WIF_PROVIDER != ''
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/druthers/druthers-web:${{ github.event.release.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push image
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet
          docker build \
            --build-arg "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}" \
            --build-arg "NEXT_PUBLIC_APP_ENV=prod" \
            -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy druthers-web \
            --image "$IMAGE" \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }}
